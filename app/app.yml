command: ["streamlit", "run", "app.py", "--server.port", "$DATABRICKS_APP_PORT", "--server.address", "0.0.0.0"]

env:
  - name: DATABRICKS_HOST
    valueFrom: "workspace"
  - name: DATABRICKS_WAREHOUSE_ID
    description: "SQL Warehouse ID for queries"
  - name: DATABRICKS_CATALOG
    value: "crl_intelligence"
  - name: DATABRICKS_SCHEMA
    value: "prod"
